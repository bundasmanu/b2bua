---

name: Docker Build + Run Test

on:
  push:
    branches:
      - 'main'
    tags:
      - '*'

jobs:

  b2bua-build-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: false
          load: true
          tags: b2bua:test
          platforms: linux/amd64

      - name: Run Docker image
        run: |
          set -euo pipefail
          container=$(docker run -d --rm b2bua:test)
          echo "Started container $container"
          if ! timeout 30s docker wait "$container"; then
            rc=$?
            if [ "$rc" -eq 124 ]; then
              echo "Container did not exit within 30 seconds; stopping it and closing workflow with success."
              docker stop "$container" >/dev/null || true
              exit 0
            fi
            exit $rc
          fi
