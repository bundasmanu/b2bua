---
name: Helm Chart Install Test

on:
  pull_request:
  push:
    branches:
      - 'main'
    tags:
      - '*'

jobs:
  helm-test:
    runs-on: ubuntu-latest
    env:
      K3D_CLUSTER_NAME: ci
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.16.0'

      - name: Create k3d cluster
        uses: AbsaOSS/k3d-action@v2
        with:
          cluster-name: ${{ env.K3D_CLUSTER_NAME }}
          args: >-
            --agents 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build registrar-server image (ci tag)
        uses: docker/build-push-action@v5
        with:
          context: .
          target: b2bua
          push: false
          load: true
          tags: bundasmanu/b2bua:ci
          platforms: linux/amd64

      - name: Import image into k3d cluster
        run: k3d image import bundasmanu/b2bua:ci -c "${{ env.K3D_CLUSTER_NAME }}"

      - name: Lint chart
        run: helm lint k8s/helm/b2bua

      - name: Template chart
        run: |
          set -euo pipefail
          helm template b2bua k8s/helm/b2bua \
            --namespace b2bua \
            --debug

      - name: Helm install
        run: |
          helm upgrade --install b2bua k8s/helm/b2bua \
            --namespace b2bua \
            --set image.tag=ci \
            --set image.pullPolicy=IfNotPresent

      - name: Wait 1 min
        run: sleep 60

      - name: Debug b2bua pods
        if: always()
        run: |
          set -e

          echo "=== PODS ==="
          kubectl get pods -n b2bua -o wide

          echo "=== DEPLOYMENT STATUS ==="
          kubectl get deployment -n b2bua -o wide || true

          echo "=== POD DETAILS ==="
          kubectl describe pods -n b2bua -l app.kubernetes.io/name=b2bua || true

          echo "=== RECENT EVENTS (IMPORTANT) ==="
          kubectl get events -n b2bua --sort-by=.lastTimestamp | tail -n 30 || true

          POD=$(kubectl get pods -n b2bua -l app.kubernetes.io/name=b2bua \
            -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)

          if [ -z "$POD" ]; then
            echo "No pods found"
            exit 0
          fi

          echo "=== TARGET POD: $POD ==="

          echo "=== CONTAINER STATE ==="
          kubectl get pod -n b2bua "$POD" -o jsonpath='{.status.containerStatuses[*].state}' || true
          echo

          echo "=== LAST LOGS ==="
          kubectl logs -n b2bua "$POD" --tail=300 || true

          echo "=== PREVIOUS LOGS (CRASH) ==="
          kubectl logs -n b2bua "$POD" --previous --tail=300 || true
