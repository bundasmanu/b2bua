apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Values.instanceName }}
  labels:
    app.kubernetes.io/name: b2bua
    app.kubernetes.io/instance: {{ .Values.instanceName }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  serviceName: {{ .Values.instanceName }}
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: b2bua
      app.kubernetes.io/instance: {{ .Values.instanceName }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: b2bua
        app.kubernetes.io/instance: {{ .Values.instanceName }}
    spec:
      hostNetwork: {{ .Values.hostNetwork }}
      {{- if .Values.hostNetwork }}
      dnsPolicy: ClusterFirstWithHostNet
      {{- end }}
      containers:
      - name: b2bua
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        command: ["./entrypoint.sh"]
        args: ["start"]
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: INSTANCE_NAME
          value: {{ .Values.instanceName | quote }}

        - name: LOCAL_SIP_ENDPOINT
          value: "$(POD_NAME).$(INSTANCE_NAME).$(POD_NAMESPACE).svc.cluster.local"

        - name: OUTBOUND_ADDR
          value: "kamailio-core.kamailio.svc.cluster.local:5060"

        {{- range $key, $value := .Values.env }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}

        resources: {}

  updateStrategy:
    type: RollingUpdate
